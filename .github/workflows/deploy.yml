name: Deploy Website to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del codigo
      uses: actions/checkout@v3

    - name: Configurar credenciales de AWS
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: sa-east-1

    - name: Subir archivos a S3
      run: aws s3 sync ./frontend s3://aws-cloud-resume-jbaigorria --delete

    - name: Borrar cache de CloudFront
      run: aws cloudfront create-invalidation --distribution-id E1L8E68MOQM6L4 --paths "/*"